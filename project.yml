name: Flow
options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    ENABLE_HARDENED_RUNTIME: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.0"
packages:
  Highlightr:
    url: https://github.com/raspu/Highlightr.git
    branch: master
targets:
  Flow:
    type: application
    platform: macOS
    sources:
      - path: Flow
    dependencies:
      - package: Highlightr
    settings:
      base:
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Flow/Flow.entitlements
        COMBINE_HIDPI_IMAGES: YES
        DEVELOPMENT_ASSET_PATHS: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.casey.flow
        PRODUCT_NAME: Flow
    info:
      path: Flow/Info.plist
schemes:
  Flow:
    build:
      targets:
        Flow: all
    run:
      config: Debug
